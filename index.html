<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сколько Артурчик нас кормит завтраками?</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
    font-family:"Space Grotesk",sans-serif;

    background:linear-gradient(140deg,#020202,#070707,#0b0b0b,#050505);
    background-size:400% 400%;
    animation:bgmove 20s ease infinite;
}

@keyframes bgmove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    font-size:44px;
    max-width:900px;
    margin-bottom:40px;
    font-weight:600;
    position:relative;
}

h1::after{
    content:attr(data-text);
    position:absolute;
    left:2px;
    top:2px;
    color:#ff4f4f;
    opacity:0.25;
}

#timer{
    font-family:"Orbitron",monospace;
    font-size:48px;
    background:rgba(255,255,255,0.05);
    padding:30px 60px;
    border-radius:14px;
    margin-bottom:25px;
    box-shadow:0 0 20px rgba(255,255,255,0.08);
    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px rgba(255,255,255,0.05);}
    50%{box-shadow:0 0 25px rgba(255,255,255,0.15);}
    100%{box-shadow:0 0 10px rgba(255,255,255,0.05);}
}

.subtitle{
    opacity:0.6;
    margin-bottom:20px;
    font-size:18px;
}

button{
    background:#151515;
    border:1px solid #2a2a2a;
    color:white;
    padding:16px 36px;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
    transition:0.25s;
    margin:5px;
}

button:hover{
    background:#242424;
    transform:scale(1.06);
}

#answer, #events{
    margin-top:15px;
    font-size:20px;
    min-height:30px;
    opacity:0.9;
}

.status{
    margin-top:15px;
    font-size:16px;
    opacity:0.6;
    font-family:monospace;
    animation:blink 3s infinite;
}

@keyframes blink{
    0%,100%{opacity:0.3}
    50%{opacity:0.8}
}

/* Стикер */
#sticker {
    position: absolute;
    width: 100px;
    top: 100px;
    left: 100px;
    pointer-events: none;
}

#convert{
    margin-top:20px;
    font-size:18px;
    opacity:0.7;
}
</style>
</head>
<body>

<h1 data-text="Сколько Артурчик нас кормит завтраками о выходе альбома?">
Сколько Артурчик нас кормит завтраками о выходе альбома?
</h1>

<div id="timer"></div>
<div id="convert"></div>

<div class="subtitle">И до сих пор не вышло...</div>

<button onclick="checkRelease()">Вышло?</button>
<div id="answer"></div>

<button onclick="showEvents()">Что случилось за это время?</button>
<div id="events"></div>

<div class="status"></div>

<!-- Стикер -->
<img src="sticker.png" id="sticker">

<script>
// --- Таймер с правильным склонением ---
const startDate = new Date("2021-05-18T00:00:00");

function declension(n, words){
    n = Math.abs(n);
    if(n%10 === 1 && n%100 !== 11) return words[0];
    if([2,3,4].includes(n%10) && ![12,13,14].includes(n%100)) return words[1];
    return words[2];
}

function updateTimer(){
    const now = new Date();
    const diffMs = now - startDate;

    const seconds = Math.floor(diffMs/1000)%60;
    const minutes = Math.floor(diffMs/60000)%60;
    const hours = Math.floor(diffMs/3600000)%24;
    const days = Math.floor(diffMs/86400000)%365;
    const years = Math.floor(diffMs/31536000000);

    document.getElementById("timer").innerHTML =
        years + " " + declension(years, ["год","года","лет"]) + " " +
        days + " " + declension(days, ["день","дня","дней"]) + " " +
        hours + " " + declension(hours, ["час","часа","часов"]) + " " +
        minutes + " " + declension(minutes, ["минута","минуты","минут"]) + " " +
        seconds + " " + declension(seconds, ["секунда","секунды","секунд"]);

    // Конвертация в общее кол-во дней, часов, минут
    const totalDays = Math.floor(diffMs/86400000);
    const totalHours = Math.floor(diffMs/3600000);
    const totalMinutes = Math.floor(diffMs/60000);

    document.getElementById("convert").innerHTML =
        `Всего: ${totalDays} ${declension(totalDays, ["день","дня","дней"])}, ` +
        `${totalHours} ${declension(totalHours, ["час","часа","часов"])}, ` +
        `${totalMinutes} ${declension(totalMinutes, ["минута","минуты","минут"])}`;
}

setInterval(updateTimer,1000);
updateTimer();

// --- Кнопка "Вышло?" ---
const answers = [
    "Нет",
    "До сих пор нет",
    "Всё ещё нет",
    "А ты думал да?",
    "Нет. Попробуй позже",
    "Система не обнаружила альбом",
    "Артурчик опять пообещал",
    "Почти... но нет",
    "Ничего не произошло",
    "Нет, но надежда умирает последней"
];

function checkRelease(){
    const randomAnswer = answers[Math.floor(Math.random()*answers.length)];
    document.getElementById("answer").innerText = randomAnswer;
}

// --- Система мониторинга релиза ---
const statusTexts = [
    "Сканирование Spotify...",
    "Сканирование Apple Music...",
    "Сканирование VK Музыки...",
    "Сканирование Яндекс Музыки...",
    "Артур снова обещал...",
    "Ничего не найдено...",
    "Черт возьми, да когда уже!"
];
let statusIndex = 0;
const statusDiv = document.querySelector(".status");
setInterval(()=>{
    statusDiv.innerText = statusTexts[statusIndex];
    statusIndex = (statusIndex + 1) % statusTexts.length;
}, 4000);

// --- Прыгающий стикер ---
let x = 100, y = 100, vx = 3+Math.random()*2, vy = 2+Math.random()*2;
const sticker = document.getElementById("sticker");

function animateSticker(){
    const w = window.innerWidth - sticker.offsetWidth;
    const h = window.innerHeight - sticker.offsetHeight;
    x += vx; y += vy;
    if(x<0||x>w) vx=-vx;
    if(y<0||y>h) vy=-vy;
    sticker.style.left = x + "px";
    sticker.style.top = y + "px";
    requestAnimationFrame(animateSticker);
}
animateSticker();

// --- Кнопка "Что случилось за это время?" ---
const eventsArray = [
"Elon Musk запустил Starship",
"Apple представила iPhone 17",
"Смерть рэпера Pop Smoke в 2021 году",
"Kanye West выпустил альбом 'Donda' в 2021",
"Drake выпустил 'Certified Lover Boy' в 2021",
"Travis Scott трагедия на фестивале Astroworld 2021",
"Megan Thee Stallion выпустила 'Good News' в 2020–2021",
"DaBaby оказался в центре скандала на Rolling Loud 2021",
"Eminem выпустил 'Music to Be Murdered By' 2020",
"Kendrick Lamar выпустил 'Mr. Morale & The Big Steppers' 2022",
"Lil Nas X вызвал резонанс с клипом 'Montero' 2021",
"NFT-бум, рекордные продажи NFT 2021",
"Пандемия COVID-19 продолжается 2021–2022",
"Протесты Black Lives Matter 2021",
"Летние Олимпийские игры Tokyo 2020 прошли в 2021",
"Выборы президента США 2020–2021",
"Бум криптовалюты, рекордные стоимости Bitcoin 2021",
"Drake побил рекорды стриминга на Spotify 2021",
"Playboi Carti выпустил 'Whole Lotta Red' 2020",
"Lil Uzi Vert вставил алмаз стоимостью $24 млн в лоб 2021",
"Tyler, The Creator выпустил 'Call Me If You Get Lost' 2021",
"Kanye West выиграл Grammy за 'Jesus Is King' 2021",
"DaBaby потерял контракты после гомофобных комментариев 2021",
"Релизы Migos 'Culture III' 2021",
"Rihanna провела шоу Savage X Fenty 2021–2022",
"Смерть рэпера DMX — 2021",
"XXXTentacion постумные релизы 2021–2022",
"Doja Cat стала глобальной сенсацией 2021–2022",
"Lizzo выпустила 'Rumors' с Cardi B 2021",
"NLE Choppa выпустил 'Top Shotta' 2021",
"Billie Eilish получила Grammys 2021",
"Rapper Pop Smoke посмертно выпустил 'Shoot for the Stars' 2021",
"Смерть рэпера MF DOOM 2021",
"Travis Scott сотрудничество с Fortnite 2021",
"Tesla выпустила Cybertruck",
"Выборы в США и мировой резонанс от прихода Трампа",
"Музыкальные премии 2022 — Grammys, BET Awards",
"Juice WRLD выпустил посмертные хиты",
"NFT и метавселенная продолжают расти 2022–2023",
"Смерть рэпера XXXTentacion продолжает волновать фанатов в 2026"
];

function showEvents(){
    const randomEvent = eventsArray[Math.floor(Math.random() * eventsArray.length)];
    document.getElementById("events").innerText = randomEvent;
}

</script>
</body>
</html>
